<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JELZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600&family=Gloock&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#D9DCE3;
    --ink:#16181D;
    --navy:#0C1866;
    --olive:#9C9E00;
    --line:#B9BECB;
    --muted:#5C6270;
    --paper:#F3F4F7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Vazirmatn', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:0;
    -webkit-font-smoothing:antialiased;
  }
  .top-bar{
    position:fixed;
    top:0; left:0; right:0;
    height:3px;
    background:var(--navy);
    z-index:5;
  }
  .wrap{
    width:100%;
    max-width:430px;
    padding:64px 28px 48px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .logo{
    width:64px;
    height:64px;
    object-fit:contain;
    margin-bottom:22px;
  }
  .wordmark{
    font-family:'Gloock', serif;
    font-weight:400;
    font-size:26px;
    letter-spacing:0.28em;
    color:var(--ink);
    margin:0 0 6px;
    direction:ltr;
  }
  .wordmark span{ color:var(--navy); }
  .rule{
    width:34px;
    height:1px;
    background:var(--line);
    margin:18px 0 20px;
  }
  .tagline{
    font-family:'Gloock', serif;
    font-style:italic;
    font-size:21px;
    font-weight:400;
    color:var(--navy);
    text-align:center;
    line-height:1.5;
    margin:0 0 10px;
    direction:ltr;
    letter-spacing:0.01em;
  }
  .tagline-sub{
    font-size:13px;
    font-weight:400;
    color:var(--muted);
    text-align:center;
    letter-spacing:0.01em;
    margin:0 0 38px;
    direction:ltr;
    unicode-bidi:plaintext;
  }
  .links{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .link-row{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    padding:14px 16px;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:8px;
    text-decoration:none;
    color:var(--ink);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.75),
      inset 0 -1px 1px rgba(12,24,102,0.10),
      0 1px 2px rgba(12,24,102,0.06);
    transition:border-color .25s ease, background .25s ease, transform .25s ease, box-shadow .25s ease;
  }
  .link-row:hover, .link-row:focus-visible{
    border-color:var(--navy);
    background:#fff;
    transform:translateY(-1px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.85),
      inset 0 -1px 1px rgba(12,24,102,0.14),
      0 3px 6px rgba(12,24,102,0.10);
  }
  .link-row:focus-visible{
    outline:2px solid var(--navy);
    outline-offset:2px;
  }
  .link-main{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .icon-chip{
    width:36px;
    height:36px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .icon-chip svg{ width:17px; height:17px; }
  .link-text{ text-align:right; }
  .link-label{
    font-size:14.5px;
    font-weight:500;
    letter-spacing:0.01em;
    display:block;
  }
  .link-sub{
    display:block;
    font-family:'Inter', sans-serif;
    font-size:10.5px;
    letter-spacing:0.06em;
    color:var(--muted);
    margin-top:3px;
    direction:ltr;
    text-align:right;
  }
  .arrow{
    font-family:'Inter', sans-serif;
    font-size:15px;
    color:var(--navy);
    transition:transform .25s ease;
    flex-shrink:0;
  }
  .link-row:hover .arrow{
    transform:translateX(-4px);
  }
  .dot-divider{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    height:24px;
  }
  .dot-divider span{
    width:4px;
    height:4px;
    border-radius:50%;
    background:var(--navy);
    display:block;
  }
  .footer{
    margin-top:40px;
    text-align:center;
  }
  .footer-line{
    font-family:'Inter', sans-serif;
    font-size:10px;
    letter-spacing:0.18em;
    color:var(--muted);
    text-transform:uppercase;
  }
  @media (prefers-reduced-motion: reduce){
    .link-row, .arrow{ transition:none; }
  }
  @media (max-width:380px){
    .wrap{ padding:48px 20px 36px; }
    .wordmark{ font-size:22px; letter-spacing:0.22em; }
    .tagline{ font-size:18px; }
  }
</style>
</head>
